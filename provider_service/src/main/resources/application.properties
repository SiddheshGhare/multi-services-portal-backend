# ===============================
# \uD83D\uDE80 SERVER CONFIG
# ===============================
server.port=8083
spring.application.name=provider-service

# ===============================
# \uD83D\uDDC4\uFE0F DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/provider_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# \uD83E\uDDE0 JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# \uD83C\uDF10 EUREKA CLIENT CONFIG
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# \uD83D\uDD0D ACTUATOR (HEALTH MONITORING)
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ===============================
# \uD83D\uDD10 JWT (FROM API GATEWAY HEADERS)
# ===============================
app.security.jwt.header.user-id=X-User-Id
app.security.jwt.header.email=X-User-Email
app.security.jwt.header.role=X-User-Role

# ===============================
# \uD83E\uDDFE LOGGING
# ===============================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE